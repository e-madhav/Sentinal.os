<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENINAL.OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');


        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1e293b;
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }


        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px -10px rgba(31, 38, 135, 0.15);
        }


        .loader {
            border: 4px solid rgba(255,255,255,0.3); border-left-color: #ffffff;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


        .float-hover {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .float-hover:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-purple-500 to-pink-500 mb-2 drop-shadow-sm">
                SENTINAL . OS
            </h1>
            <p class="text-slate-600 font-bold tracking-widest uppercase text-sm">Neural Threat Purification Framework</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-panel p-6 rounded-3xl flex flex-col gap-8">

                <div>
                    <h2 class="text-xl font-extrabold text-slate-800 mb-4 flex items-center gap-2">📸 Input Media</h2>
                    <div class="bg-white/60 p-2 rounded-2xl border border-white shadow-inner">
                        <input type="file" id="fileInput" class="block w-full text-sm text-slate-600 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition-colors cursor-pointer" accept="image/*">
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-extrabold text-slate-800 mb-4 flex items-center gap-2">⚙️ Threat Environment</h2>
                    <div class="flex flex-col gap-3">
                        <label class="float-hover flex items-center gap-4 cursor-pointer p-4 rounded-2xl bg-white/80 hover:bg-white border border-white shadow-sm">
                            <input type="radio" name="mode" value="hacked" checked class="w-6 h-6 accent-pink-500 cursor-pointer">
                            <span class="font-bold text-slate-700">👾 Hacker Mode (Vulnerable)</span>
                        </label>
                        <label class="float-hover flex items-center gap-4 cursor-pointer p-4 rounded-2xl bg-white/80 hover:bg-white border border-white shadow-sm">
                            <input type="radio" name="mode" value="defended" class="w-6 h-6 accent-teal-500 cursor-pointer">
                            <span class="font-bold text-slate-700">🛡️ Defense Shields (Purifier)</span>
                        </label>
                    </div>
                </div>

                <button id="analyzeBtn" class="mt-auto float-hover w-full py-4 rounded-2xl font-black text-lg text-white bg-gradient-to-r from-cyan-400 to-blue-500 shadow-lg shadow-blue-500/30 flex justify-center items-center gap-3">
                    <span>🚀 INITIATE SCAN</span>
                    <div id="spinner" class="loader hidden"></div>
                </button>
                <div id="errorMsg" class="text-pink-600 text-sm font-bold text-center hidden bg-pink-100 p-3 rounded-xl border border-pink-200"></div>
            </div>

            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">

                <div class="glass-panel rounded-3xl overflow-hidden flex flex-col float-hover border-2 border-white/50">
                    <div class="bg-white/60 p-4 text-center border-b border-white font-black text-sm text-slate-500 uppercase tracking-widest">Monitor 1: Clean Reference</div>
                    <div class="p-6 flex-grow flex flex-col items-center justify-center bg-white/30">
                        <img id="baseImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='224' height='224'><rect width='224' height='224' fill='%23f1f5f9' rx='24'/></svg>" class="rounded-2xl shadow-md w-full max-w-[224px] aspect-square object-cover mb-6 border-4 border-white">
                        <div class="text-center w-full bg-white/80 p-4 rounded-2xl shadow-sm border border-white">
                            <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Baseline Prediction</div>
                            <div id="baseLabel" class="text-2xl font-black text-slate-800 mb-1">-</div>
                            <div id="baseConf" class="text-blue-500 font-bold">-</div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl overflow-hidden flex flex-col float-hover border-2 border-white/50 relative">
                    <div id="liveTopBar" class="bg-white/60 p-4 text-center border-b border-white font-black text-sm text-slate-500 uppercase tracking-widest transition-colors duration-300">Monitor 2: Active Sensor</div>

                    <div class="p-6 flex-grow flex flex-col items-center justify-center bg-white/30">
                        <img id="liveImg" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='224' height='224'><rect width='224' height='224' fill='%23f1f5f9' rx='24'/></svg>" class="rounded-2xl shadow-md w-full max-w-[224px] aspect-square object-cover mb-6 border-4 border-white transition-opacity duration-300">
                        <div id="liveDataBox" class="text-center w-full bg-white/80 p-4 rounded-2xl shadow-sm border border-white transition-colors duration-300">
                            <div id="liveStatus" class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">System Status</div>
                            <div id="liveLabel" class="text-2xl font-black text-slate-800 mb-1">-</div>
                            <div id="liveConf" class="font-bold text-slate-500">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionData = null;

        const btn = document.getElementById('analyzeBtn');
        const fileInput = document.getElementById('fileInput');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('errorMsg');
        const radios = document.getElementsByName('mode');


        const baseImg = document.getElementById('baseImg');
        const baseLabel = document.getElementById('baseLabel');
        const baseConf = document.getElementById('baseConf');

        const liveImg = document.getElementById('liveImg');
        const liveLabel = document.getElementById('liveLabel');
        const liveConf = document.getElementById('liveConf');
        const liveTopBar = document.getElementById('liveTopBar');
        const liveStatus = document.getElementById('liveStatus');
        const liveDataBox = document.getElementById('liveDataBox');

        btn.addEventListener('click', async () => {
            if (!fileInput.files[0]) {
                showError("Please select an image first."); return;
            }

            btn.querySelector('span').textContent = "ANALYZING...";
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                    // --- ENVIRONMENT TOGGLE ---
                    // Uncomment the line you want to use!

                    // 1. LOCAL DEVELOPMENT (Use this when running Uvicorn on your laptop)
                        //const API_URL = "/analyze"; 

                    // 2. PRODUCTION CLOUD (Use this before dragging the folder to Vercel)
                        const API_URL = "https://emadhav-sentinal-api.hf.space/analyze"; 

                        const response = await fetch(API_URL, { method: "POST", body: formData });
                if (!response.ok) throw new Error((await response.json()).detail || "Server error");

                sessionData = await response.json();

                baseImg.src = "data:image/jpeg;base64," + sessionData.baseline.image;
                baseLabel.textContent = sessionData.baseline.label;
                baseConf.textContent = sessionData.baseline.confidence + "% Confidence";

                updateLiveMonitor();

            } catch (err) {
                showError(err.message);
            } finally {
                btn.querySelector('span').textContent = "🚀 INITIATE SCAN";
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        });

        function updateLiveMonitor() {
            if (!sessionData) return;

            const currentMode = document.querySelector('input[name="mode"]:checked').value;
            const data = sessionData[currentMode];

            liveImg.style.opacity = 0;
            setTimeout(() => {
                liveImg.src = "data:image/jpeg;base64," + data.image;
                liveLabel.textContent = data.label;
                liveConf.textContent = data.confidence + "% Confidence";

                if (currentMode === 'hacked') {

                    liveTopBar.className = "bg-pink-100 p-4 text-center border-b border-pink-200 font-black text-sm text-pink-600 uppercase tracking-widest transition-colors duration-300";
                    liveDataBox.className = "text-center w-full bg-pink-50/90 p-4 rounded-2xl shadow-sm border border-pink-200 transition-colors duration-300";
                    liveStatus.textContent = "⚠️ SYSTEM COMPROMISED";
                    liveStatus.className = "text-pink-500 text-xs font-bold uppercase tracking-wider mb-1";
                    liveConf.className = "font-bold text-pink-600";
                } else {

                    liveTopBar.className = "bg-teal-100 p-4 text-center border-b border-teal-200 font-black text-sm text-teal-600 uppercase tracking-widest transition-colors duration-300";
                    liveDataBox.className = "text-center w-full bg-teal-50/90 p-4 rounded-2xl shadow-sm border border-teal-200 transition-colors duration-300";
                    liveStatus.textContent = "🛡️ THREAT NEUTRALIZED";
                    liveStatus.className = "text-teal-500 text-xs font-bold uppercase tracking-wider mb-1";
                    liveConf.className = "font-bold text-teal-600";
                }
                liveImg.style.opacity = 1;
            }, 150);
        }

        radios.forEach(radio => radio.addEventListener('change', updateLiveMonitor));

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
